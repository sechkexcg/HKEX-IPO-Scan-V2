name: Automated IPO Tracker

on:
  schedule:
    - cron: '0 10 * * 1-5' # Runs Monday to Friday at 10:00 UTC (6:00 PM HKT)
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  track_ipos:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 yfinance pdfplumber pandas

    - name: Run Scraper & Cross-Checkers
      run: |
        python scraper.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add data/ipo_tracker.json data/ipo_tracker.csv
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Latest IPO Data & Market Caps" && git push)
