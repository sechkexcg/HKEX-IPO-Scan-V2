name: Automated HKEX IPO Scan

on:
  schedule:
    # Runs everyday at 10:00 UTC (6:00 PM HKT)
    - cron: '0 2 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 pandas yfinance

    - name: Run Scanner
      run: python scanner.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add hkex_ipo_data.json
        git diff-index --quiet HEAD || git commit -m "Auto-updated HKEX IPO listings [skip ci]"
        git push
